<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 440px; height: 280px; overflow: hidden;
    background: #0f0f0f;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex; align-items: center; justify-content: space-between;
    padding: 32px 36px;
  }

  .left {}
  .logo { font-size: 30px; font-weight: 900; color: #fff; letter-spacing: -0.5px; line-height: 1; }
  .logo span { color: #f97316; }
  .tagline { font-size: 12px; color: #555; margin-top: 8px; line-height: 1.5; }
  .tagline strong { color: #aaa; }

  .icons { display: flex; flex-direction: column; gap: 14px; }
  .icon-row { display: flex; align-items: center; gap: 12px; }
  .circle {
    width: 44px; height: 44px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 900; color: #fff; flex-shrink: 0;
  }
  .gc { background: #16a34a; box-shadow: 0 0 16px rgba(22,163,74,0.45); }
  .ac { background: #d97706; box-shadow: 0 0 16px rgba(217,119,6,0.45); }
  .rc { background: #dc2626; box-shadow: 0 0 16px rgba(220,38,38,0.45); }
  .label { font-size: 12px; color: #555; }
  .label strong { display: block; font-size: 13px; color: #ccc; }
</style>
</head>
<body>
  <div class="left">
    <div class="logo">Claud<span>o</span>meter</div>
    <div class="tagline">
      <strong>Know your Claude usage</strong><br>
      at a glance — right in<br>your Chrome toolbar.
    </div>
  </div>

  <div class="icons">
    <div class="icon-row">
      <div class="circle gc">42</div>
      <div class="label"><strong>All good</strong>Under 70%</div>
    </div>
    <div class="icon-row">
      <div class="circle ac">75</div>
      <div class="label"><strong>Heads up</strong>70–89%</div>
    </div>
    <div class="icon-row">
      <div class="circle rc">93</div>
      <div class="label"><strong>Almost out</strong>90%+</div>
    </div>
  </div>
</body>
</html>
